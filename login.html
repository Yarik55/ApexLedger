<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | ApexLedger</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div class="container header-inner">
    <div class="brand">
      <h1>Apex<span>Ledger</span></h1>
      <p>Client portal</p>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a href="about.html">About</a>
      <a href="contact.html">Contact</a>
      <a href="login.html" class="login-link">Login</a>
    </nav>
  </div>
</header>
 
<main>
  <div class="container" style="max-width: 480px;">
    <div class="fade-up" style="padding-top: 24px;">
      <div class="section-label" style="margin-bottom: 8px;">Client portal</div>
      <h2 style="margin-bottom: 4px;">Sign in</h2>
      <p class="small" style="margin-bottom: 4px;">Authentication will be connected next.</p>
    </div>
 
    <section class="card fade-up-2" style="margin-top: 24px;">
      <div id="msg" class="notice" style="display:none; margin-bottom: 16px;"></div>
      <form id="loginForm" novalidate style="max-width: 100%;">
        <div>
          <label for="email">Email address</label>
          <input id="email" type="email" name="email" placeholder="you@example.com" required>
        </div>
        <div>
          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="Minimum 8 characters" required minlength="8">
        </div>
        <div>
          <button type="submit">Sign in →</button>
        </div>
        <p class="small" style="text-align: center; margin-top: 4px;">
          Forgot password — coming soon. &nbsp;·&nbsp;
          <a href="contact.html" style="color: var(--gold); text-decoration: none;">Need access?</a>
        </p>
      </form>
    </section>
 
    <p class="small fade-up-3" style="text-align: center; margin-top: 20px;">
      Don't have an account? <a href="contact.html" style="color: var(--gold-light); text-decoration: none;">Contact us to get set up.</a>
    </p>
  </div>
</main>
 
<footer>
  <div class="container footer-inner">
    <div class="footer-brand">Apex<span>Ledger</span></div>
    <div class="footer-copy">© 2026 ApexLedger</div>
  </div>
</footer>
 
<script>
  const form = document.getElementById("loginForm");
  const msg  = document.getElementById("msg");
 
  function show(text, type = ""){
    msg.style.display = "block";
    msg.textContent   = text;
    msg.className     = "notice" + (type ? " " + type : "");
  }
 
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const email = document.getElementById("email").value.trim();
    const pw    = document.getElementById("password").value;
    if (!email.includes("@")) return show("Please enter a valid email address.", "error");
    if (pw.length < 8)        return show("Password must be at least 8 characters.", "error");
    show("Login submitted (placeholder) — authentication coming soon.", "success");
    form.reset();
  });
</script>
</body>
</html>
